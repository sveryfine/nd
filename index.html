<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECN Tracker | Hệ Thống Quản Lý Số Lot</title>
    <meta name="description" content="Hệ thống quản lý thay đổi kỹ thuật (ECN) và theo dõi số lot hàng xuất xưởng.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <div class="app-container">
        <!-- Sidebar moved to the left -->
        <aside class="sidebar">

            <!-- Sort Section -->
            <div class="sidebar-section filter-section">
                <h3><i data-lucide="arrow-down-up" style="width:14px;height:14px;display:inline;vertical-align:-2px;margin-right:4px;"></i> Sắp xếp</h3>
                <div class="sort-toggle-grid">
                    <button class="sort-toggle-btn" data-sort="itemCode-asc" id="sortItemAZ">
                        <i data-lucide="arrow-up-a-z" style="width:14px;height:14px;"></i>
                        <span>A → Z</span>
                    </button>
                    <button class="sort-toggle-btn" data-sort="itemCode-desc" id="sortItemZA">
                        <i data-lucide="arrow-down-z-a" style="width:14px;height:14px;"></i>
                        <span>Z → A</span>
                    </button>
                    <button class="sort-toggle-btn active" data-sort="time-desc" id="sortTimeNewest">
                        <i data-lucide="calendar-check" style="width:14px;height:14px;"></i>
                        <span>Mới nhất</span>
                    </button>
                    <button class="sort-toggle-btn" data-sort="time-asc" id="sortTimeOldest">
                        <i data-lucide="calendar" style="width:14px;height:14px;"></i>
                        <span>Cũ nhất</span>
                    </button>
                </div>
            </div>

            <!-- Filter by Status -->
            <div class="sidebar-section filter-section">
                <h3><i data-lucide="filter" style="width:14px;height:14px;display:inline;vertical-align:-2px;margin-right:4px;"></i> Trạng thái</h3>
                <div class="status-filter-group">
                    <button class="status-filter-btn active" data-status="all" id="filterAll">
                        <i data-lucide="layers" style="width:14px;height:14px;"></i>
                        <span>Tất cả</span>
                    </button>
                    <button class="status-filter-btn" data-status="incomplete" id="filterIncomplete">
                        <i data-lucide="clock" style="width:14px;height:14px;"></i>
                        <span>Chưa xong</span>
                    </button>
                    <button class="status-filter-btn" data-status="complete" id="filterComplete">
                        <i data-lucide="check-circle" style="width:14px;height:14px;"></i>
                        <span>Hoàn thành</span>
                    </button>
                </div>
            </div>

            <div class="sidebar-divider"></div>

            <!-- Production Lines -->
            <div class="sidebar-section">
                <h3>Production Lines</h3>
                <div id="lineList">
                    <!-- Lines will be injected dynamically -->
                </div>
            </div>

            <div class="sidebar-divider"></div>

            <!-- Change History -->
            <div class="sidebar-section">
                <h3><i data-lucide="history" style="width:14px;height:14px;display:inline;vertical-align:-2px;margin-right:4px;"></i> Lịch sử thay đổi</h3>
                <div id="sidebarHistory" class="sidebar-history">
                    <div class="history-empty">
                        <p>Chưa có lịch sử</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-view">
            <header class="main-header">
                <div style="display: flex; gap: 12px; align-items: center;">
                    <button id="sidebarToggle" class="line-item"
                        style="border: none; background: transparent; width: 32px; height: 32px; padding: 0; justify-content: center; color: var(--text-main); display: flex;">
                        <i data-lucide="menu" style="width: 20px; height: 20px;"></i>
                    </button>
                    <div>
                        <h1 class="text-gradient" style="font-size: 20px; margin: 0;">ECN Tracking</h1>
                        <div style="display: flex; align-items: center; gap: 6px;">
                            <p class="desktop-only" style="color: var(--text-dim); margin: 2px 0 0 0; font-size: 12px;">Hệ thống theo dõi tiến độ</p>
                            <div id="syncIndicator" class="sync-indicator">
                                <div class="sync-dot"></div>
                                <span class="sync-time">Đang tải...</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="display: flex; gap: 8px; align-items: center;">
                    <div id="adminActions" style="display: none; gap: 8px; align-items: center;">
                        <button id="addEcnBtn" class="line-item"
                            style="border: none; background: transparent; color: var(--primary); min-width: 32px; height: 32px; padding: 0 8px; justify-content: center; display: flex; align-items: center;">
                            <i data-lucide="plus" style="width: 20px; height: 20px;"></i>
                            <span class="desktop-only" style="margin-left: 6px; font-weight: 600; font-size: 13px;">Thêm
                                ECN</span>
                        </button>
                    </div>
                    <!-- Reload Button -->
                    <button id="reloadBtn" class="line-item reload-btn"
                        style="border: none; background: transparent; min-width: 32px; height: 32px; padding: 0 8px; justify-content: center; display: flex; align-items: center; color: var(--text-dim);"
                        title="Tải lại trang">
                        <i data-lucide="rotate-cw" style="width: 18px; height: 18px;"></i>
                    </button>
                    <!-- Notification Bell -->
                    <div class="notif-wrapper" id="notifWrapper">
                        <button id="notifBell" class="line-item notif-bell-btn"
                            style="border: none; background: transparent; min-width: 32px; height: 32px; padding: 0 8px; justify-content: center; display: flex; align-items: center; color: var(--text-dim); position: relative;">
                            <i data-lucide="bell" style="width: 20px; height: 20px;"></i>
                            <span id="notifBadge" class="notif-badge" style="display: none;">0</span>
                        </button>
                        <div id="notifDropdown" class="notif-dropdown">
                            <div class="notif-dropdown-header">
                                <h4>Thông báo</h4>
                                <button id="notifClearAll" class="notif-clear-btn" style="display: none;">Xóa tất cả</button>
                            </div>
                            <div id="notifList" class="notif-list">
                                <div class="notif-empty">
                                    <i data-lucide="bell-off" style="width: 32px; height: 32px; opacity: 0.3;"></i>
                                    <p>Chưa có thông báo</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button id="adminToggle" class="line-item"
                        style="border: none; background: transparent; min-width: 32px; height: 32px; padding: 0 8px; justify-content: center; display: flex; align-items: center; color: var(--text-dim);">
                        <i data-lucide="user-cog" style="width: 20px; height: 20px;"></i>
                        <span class="desktop-only"
                            style="font-size: 13px; margin-left: 6px; font-weight: 600;">Admin</span>
                    </button>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="search-container">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Tìm kiếm...">
                </div>

                <div id="ecnGrid" class="ecn-grid">
                    <!-- Cards will be injected here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Detail Panel Overlay -->
    <div id="detailOverlay" class="detail-overlay">
        <div class="detail-panel">
            <div
                style="display: flex; align-items: flex-start; justify-content: center; margin-bottom: 12px; position: relative; min-height: 42px;">
                <button id="closeDetail"
                    style="background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; position: absolute; left: -8px; top: -14px; transition: all 0.2s;">
                    <i data-lucide="arrow-left" style="width: 20px; height: 20px;"></i>
                </button>
                <div
                    style="display: flex; flex-direction: column; align-items: center; width: 100%; padding: 0 48px; margin-top: -12px;">
                    <h3 id="detailHeaderTitle"
                        style="margin: 0; font-size: 28px; font-weight: 900; line-height: 1.1; text-align: center; word-break: break-word; transition: all 0.3s ease; letter-spacing: -0.5px;">
                        -</h3>
                </div>
            </div>

            <div id="detailContent">
                <!-- Detail content injected here -->
            </div>
        </div>
    </div>

    <!-- Add ECN Modal -->
    <div id="addModal" class="detail-overlay"
        style="z-index: 2100; align-items: center; justify-content: center; padding: 10px;">
        <div class="detail-panel"
            style="width: 95%; max-width: 360px; height: auto; max-height: 92vh; overflow-y: auto; border-radius: var(--radius-lg); padding: 18px;">
            <h2 id="modalTitle" style="margin-bottom: 14px; font-size: 17px;">Thêm ECN Mới</h2>
            <form id="addEcnForm" style="display: flex; flex-direction: column; gap: 8px;">
                <input type="text" id="newEcnId" class="search-input" placeholder="Tên ECN (ví dụ: ECN-2024-004)"
                    style="padding: 10px; font-size: 13px; height: 42px;" required>

                <textarea id="newItemCode" class="search-input"
                    style="height: 56px; resize: none; padding: 10px; font-size: 12px;"
                    placeholder="Mã hàng (Mã1, Mã2...)" required></textarea>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <select id="newLine" class="search-input" style="height: 42px; font-size: 12px; padding: 0 10px;">
                        <option value="CR">CR</option>
                        <option value="CV">CV</option>
                        <option value="SP">SP</option>
                        <option value="HC">HC</option>
                        <option value="PSW">PSW</option>
                        <option value="VS1">VS1</option>
                        <option value="HM">HM</option>
                        <option value="VS2">VS2</option>
                        <option value="GA">GA</option>
                        <option value="PC">PC</option>
                    </select>
                    <select id="new4m" class="search-input" style="height: 42px; font-size: 12px; padding: 0 10px;">
                        <option value="" disabled selected>Chọn 4M+1E...</option>
                        <option value="Machine">Machine</option>
                        <option value="Materials">Materials</option>
                        <option value="Method">Method</option>
                        <option value="Measurement">Measurement</option>
                        <option value="Environment">Environment</option>
                    </select>
                </div>

                <div style="display: flex; gap: 8px; align-items: center;">
                    <select id="newCat" class="search-input"
                        style="flex: 1; height: 42px; font-size: 12px; padding: 0 10px;">
                        <!-- Categories -->
                    </select>
                    <button type="button" id="addCatModalBtn"
                        style="width: 42px; height: 42px; background: var(--primary-glow); border: 1px solid var(--primary); color: var(--primary); border-radius: 6px; display: none; align-items: center; justify-content: center; cursor: pointer;">
                        <i data-lucide="plus" style="width: 18px;"></i>
                    </button>
                </div>

                <textarea id="newDesc" class="search-input" style="height: 56px; padding: 10px; font-size: 12px;"
                    placeholder="Nội dung thay đổi"></textarea>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <input type="text" id="newImage" class="search-input"
                        style="height: 42px; font-size: 11px; padding: 0 10px;" placeholder="Link Ảnh (Drive)">
                    <input type="text" id="newDrive" class="search-input"
                        style="height: 42px; font-size: 11px; padding: 0 10px;" placeholder="Link Tài liệu">
                </div>

                <div style="display: flex; gap: 8px; margin-top: 6px;">
                    <button type="button" id="saveEcn"
                        style="flex: 1; padding: 10px; background: var(--primary); color: white; border: none; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; font-size: 13px;">Lưu</button>
                    <button type="button" id="cancelAdd"
                        style="flex: 1; padding: 10px; background: var(--bg-accent); color: var(--text-dim); border: none; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; font-size: 13px;">Hủy</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Category Overlay (Custom Prompt) -->
    <div id="catPromptOverlay" class="detail-overlay"
        style="z-index: 2200; align-items: center; justify-content: center;">
        <div class="detail-panel"
            style="width: 400px; height: auto; border-radius: var(--radius-md); padding: 32px; border: 1px solid var(--primary);">
            <h3 style="margin-bottom: 20px;">Thêm phân loại mới</h3>
            <input type="text" id="newCatInput" class="search-input" placeholder="Tên phân loại (ví dụ: Seal, Wire...)">
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button id="saveCatBtn"
                    style="flex: 1; padding: 12px; background: var(--primary); color: var(--bg-dark); border: none; border-radius: var(--radius-md); font-weight: 700; cursor: pointer;">Lưu</button>
                <button id="cancelCatBtn"
                    style="flex: 1; padding: 12px; background: var(--bg-accent); color: white; border: none; border-radius: var(--radius-md); font-weight: 700; cursor: pointer;">Hủy</button>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div id="deleteConfirmOverlay" class="detail-overlay"
        style="z-index: 2300; align-items: center; justify-content: center;">
        <div class="detail-panel"
            style="width: 400px; height: auto; border-radius: var(--radius-md); padding: 32px; border: 1px solid var(--danger);">
            <h3 style="margin-bottom: 12px; color: var(--danger);">Xác nhận xóa</h3>
            <p id="deleteConfirmText" style="margin-bottom: 24px; line-height: 1.5; color: var(--text-dim);"></p>
            <div style="display: flex; gap: 12px;">
                <button id="confirmDeleteBtn"
                    style="flex: 1; padding: 12px; background: var(--danger); color: white; border: none; border-radius: var(--radius-md); font-weight: 700; cursor: pointer;">Xóa</button>
                <button id="cancelDeleteBtn"
                    style="flex: 1; padding: 12px; background: var(--bg-accent); color: var(--text-main); border: none; border-radius: var(--radius-md); font-weight: 700; cursor: pointer;">Hủy</button>
            </div>
        </div>
    </div>

    <!-- Password Modal -->
    <div id="passwordModal" class="detail-overlay" style="z-index: 3000; align-items: center; justify-content: center;">
        <div class="detail-panel"
            style="width: 320px; height: auto; border-radius: var(--radius-md); padding: 24px; border: 1px solid var(--primary); text-align: center;">
            <h3 style="margin-bottom: 16px;">Xác thực Admin</h3>
            <input type="password" id="adminPasswordInput" class="search-input" placeholder="Nhập mật khẩu..."
                style="margin-bottom: 20px; text-align: center; letter-spacing: 4px;">
            <div style="display: flex; gap: 8px;">
                <button id="submitPassword"
                    style="flex: 1; padding: 10px; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); font-weight: 700; cursor: pointer;">Đăng
                    nhập</button>
                <button id="cancelPassword"
                    style="flex: 1; padding: 10px; background: var(--bg-accent); color: var(--text-dim); border: none; border-radius: var(--radius-sm); font-weight: 700; cursor: pointer;">Hủy</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
    <!-- Full Screen Image Viewer -->
    <div id="imageViewer" class="detail-overlay"
        style="z-index: 9999; background: rgba(0, 0, 0, 0.98); display: none; align-items: center; justify-content: center; padding: 0; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;">
        <button id="closeViewer" onclick="closeImageViewer()"
            style="position: absolute; top: 20px; right: 20px; background: none; border: none; color: white; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10000; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));">
            <i data-lucide="x" style="width: 24px; height: 24px;"></i>
        </button>
        <div id="viewerContent"
            style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; touch-action: none;">
            <img id="fullImage" src=""
                style="max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); cursor: zoom-in; touch-action: none;">
        </div>
    </div>
</body>

</html>
